name: Build unsigned IPA

# Builds Siraat on a free macOS runner and produces an UNSIGNED .ipa.
# You then sign + install it on your iPhone from Windows with Sideloadly
# (or AltStore/SideStore) using your own Apple ID — no Mac required.
# Also captures per-screen simulator screenshots for the design sprint.

on:
  push:
    branches: [main, "feat/**", "feature/**", "fix/**", "chore/**", "hardening/**", "claude/**"]
  workflow_dispatch: {}   # lets you run it by hand from the Actions tab (any branch)

permissions:
  contents: write   # allows publishing the .ipa as a Release asset

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Select Xcode 16
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16"

      - name: Show build environment
        run: |
          xcodebuild -version
          xcodebuild -list -project Siraat.xcodeproj

      - name: Prepare iOS Simulator
        # Runner images vary and some ship with no pre-created simulators (only
        # placeholders), which breaks a hardcoded `name=iPhone 16` destination. Create and
        # boot one explicitly, then reuse its UDID for tests + screenshots.
        run: |
          set -o pipefail
          RUNTIME=$(xcrun simctl list runtimes | grep -oE 'com.apple.CoreSimulator.SimRuntime.iOS-[0-9-]+' | tail -1)
          echo "Runtime: $RUNTIME"
          SIM_UDID=$(xcrun simctl create "ci-iphone" "iPhone 16" "$RUNTIME" 2>/dev/null \
            || xcrun simctl create "ci-iphone" "iPhone 15" "$RUNTIME" 2>/dev/null \
            || xcrun simctl create "ci-iphone" "iPhone SE (3rd generation)" "$RUNTIME")
          echo "Created simulator: $SIM_UDID"
          xcrun simctl boot "$SIM_UDID"
          xcrun simctl bootstatus "$SIM_UDID" -b
          echo "SIM_UDID=$SIM_UDID" >> "$GITHUB_ENV"

      - name: Run tests (correctness validation)
        run: |
          set -o pipefail
          xcodebuild \
            -project Siraat.xcodeproj \
            -scheme Siraat \
            -destination "id=$SIM_UDID" \
            test

      - name: Capture per-screen screenshots (design sprint before/after)
        continue-on-error: true
        run: |
          set -o pipefail
          xcodebuild \
            -project Siraat.xcodeproj \
            -scheme Siraat \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath build-sim \
            CODE_SIGNING_ALLOWED=NO \
            build

          APP="build-sim/Build/Products/Debug-iphonesimulator/Siraat.app"
          BUNDLE_ID="com.siraat.app"

          xcrun simctl install "$SIM_UDID" "$APP"
          xcrun simctl privacy "$SIM_UDID" grant location-always "$BUNDLE_ID" || true
          xcrun simctl location "$SIM_UDID" set 29.7604,-95.3698 || true

          mkdir -p screenshots
          for SCREEN in dashboard reader recitation khutba; do
            xcrun simctl terminate "$SIM_UDID" "$BUNDLE_ID" 2>/dev/null || true
            SIMCTL_CHILD_UITEST_SCREEN="$SCREEN" xcrun simctl launch "$SIM_UDID" "$BUNDLE_ID"
            sleep 8
            xcrun simctl io "$SIM_UDID" screenshot "screenshots/$SCREEN.png" && echo "captured $SCREEN"
          done
          ls -la screenshots

      - name: Upload screenshots
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v5
        with:
          name: Siraat-screenshots
          path: screenshots/*.png
          if-no-files-found: warn
          retention-days: 14

      - name: Build (Release, no code signing)
        run: |
          set -o pipefail
          xcodebuild \
            -project Siraat.xcodeproj \
            -scheme Siraat \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            clean build

      - name: Package unsigned .ipa
        run: |
          APP_PATH="build/Build/Products/Release-iphoneos/Siraat.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "::error::Build product not found at $APP_PATH"
            ls -R build/Build/Products || true
            exit 1
          fi
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -r -y Siraat-unsigned.ipa Payload >/dev/null
          echo "Created Siraat-unsigned.ipa:"
          ls -lh Siraat-unsigned.ipa

      - name: Upload .ipa artifact
        uses: actions/upload-artifact@v5
        with:
          name: Siraat-unsigned-ipa
          path: Siraat-unsigned.ipa
          if-no-files-found: error
          retention-days: 14

      - name: Publish .ipa to a one-click Release
        # Direct, no-login download link for the unsigned IPA (public repo). The tag
        # moves to the latest build on this branch so the URL is stable:
        #   https://github.com/DM8581912/Siraat/releases/download/tajweed-test/Siraat-unsigned.ipa
        if: github.ref == 'refs/heads/claude/tajweed-recitation-engine-0n8vq6'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: tajweed-test
          name: Tajweed test build (unsigned IPA)
          prerelease: true
          target_commitish: ${{ github.sha }}
          files: Siraat-unsigned.ipa
          body: |
            Unsigned IPA for sideload testing of the on-device Tajweed engine.
            Sideload with AltStore / SideStore / Sideloadly using your Apple ID.
            Built from ${{ github.sha }}.

  # Converts the Wav2Vec2 Arabic phonetic CTC model to Core ML and publishes the
  # compiled .mlmodelc + phoneme vocab as artifacts. Kept as its own job (does not gate
  # the IPA build) while we validate conversion on the runner and capture the model's
  # exact I/O contract from the logs. Once proven, the IPA build bundles the model.
  convert-model:
    runs-on: macos-15
    timeout-minutes: 40
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ML tooling
        run: |
          python -m pip install --upgrade pip
          pip install "torch==2.4.*" "transformers==4.44.*" "coremltools==8.*" sentencepiece

      - name: Convert model to Core ML
        run: |
          set -o pipefail
          mkdir -p build
          python Scripts/convert_wav2vec2_phonetics.py \
            --model TBOGamer22/wav2vec2-quran-phonetics \
            --out build/Wav2Vec2QuranPhonetics.mlpackage \
            --vocab build/phoneme_vocab.json 2>&1 | tee build/convert.log

      - name: Compile to .mlmodelc
        run: |
          xcrun coremlcompiler compile build/Wav2Vec2QuranPhonetics.mlpackage build/
          ls -lhR build/Wav2Vec2QuranPhonetics.mlmodelc || true

      - name: Upload model + vocab + conversion log
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: Tajweed-coreml-model
          path: |
            build/Wav2Vec2QuranPhonetics.mlmodelc
            build/phoneme_vocab.json
            build/convert.log
          if-no-files-found: warn
          retention-days: 14
