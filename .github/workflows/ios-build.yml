name: Build unsigned IPA

# Builds Siraat on a free macOS runner and produces an UNSIGNED .ipa.
# You then sign + install it on your iPhone from Windows with Sideloadly
# (or AltStore/SideStore) using your own Apple ID — no Mac required.

on:
  push:
    branches: [main, "feat/**", "feature/**", "fix/**", "chore/**"]
  workflow_dispatch: {}   # lets you run it by hand from the Actions tab (any branch)

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Select Xcode 16
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16"

      - name: Show build environment
        run: |
          xcodebuild -version
          xcodebuild -list -project Siraat.xcodeproj

      - name: Run tests (correctness validation)
        run: |
          set -o pipefail
          xcodebuild \
            -project Siraat.xcodeproj \
            -scheme Siraat \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            test

      - name: Capture per-screen screenshots (design sprint before/after)
        continue-on-error: true
        run: |
          set -o pipefail
          xcodebuild \
            -project Siraat.xcodeproj \
            -scheme Siraat \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath build-sim \
            CODE_SIGNING_ALLOWED=NO \
            build

          APP="build-sim/Build/Products/Debug-iphonesimulator/Siraat.app"
          BUNDLE_ID="com.siraat.app"

          DEVICE=$(xcrun simctl list devices available | grep -m1 "iPhone 16 (" | grep -oE '[0-9A-Fa-f-]{36}')
          if [ -z "$DEVICE" ]; then DEVICE=$(xcrun simctl create shot-iphone "iPhone 16"); fi
          echo "Simulator: $DEVICE"
          xcrun simctl boot "$DEVICE" || true
          xcrun simctl bootstatus "$DEVICE" -b || true

          xcrun simctl install "$DEVICE" "$APP"
          xcrun simctl privacy "$DEVICE" grant location-always "$BUNDLE_ID" || true
          xcrun simctl location "$DEVICE" set 29.7604,-95.3698 || true

          mkdir -p screenshots
          for SCREEN in dashboard reader recitation khutba; do
            xcrun simctl terminate "$DEVICE" "$BUNDLE_ID" 2>/dev/null || true
            SIMCTL_CHILD_UITEST_SCREEN="$SCREEN" xcrun simctl launch "$DEVICE" "$BUNDLE_ID"
            sleep 7
            xcrun simctl io "$DEVICE" screenshot "screenshots/$SCREEN.png" && echo "captured $SCREEN"
          done
          ls -la screenshots

      - name: Upload screenshots
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v5
        with:
          name: Siraat-screenshots
          path: screenshots/*.png
          if-no-files-found: warn
          retention-days: 14

      - name: Build (Release, no code signing)
        run: |
          set -o pipefail
          xcodebuild \
            -project Siraat.xcodeproj \
            -scheme Siraat \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            clean build

      - name: Package unsigned .ipa
        run: |
          APP_PATH="build/Build/Products/Release-iphoneos/Siraat.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "::error::Build product not found at $APP_PATH"
            ls -R build/Build/Products || true
            exit 1
          fi
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -r -y Siraat-unsigned.ipa Payload >/dev/null
          echo "Created Siraat-unsigned.ipa:"
          ls -lh Siraat-unsigned.ipa

      - name: Upload .ipa artifact
        uses: actions/upload-artifact@v5
        with:
          name: Siraat-unsigned-ipa
          path: Siraat-unsigned.ipa
          if-no-files-found: error
          retention-days: 14
