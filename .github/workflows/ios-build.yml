name: Build unsigned IPA

# Builds Siraat on a free macOS runner and produces an UNSIGNED .ipa.
# You then sign + install it on your iPhone from Windows with Sideloadly
# (or AltStore/SideStore) using your own Apple ID — no Mac required.

on:
  push:
    branches: [main, "feat/**", "feature/**", "fix/**", "chore/**"]
  workflow_dispatch: {}   # lets you run it by hand from the Actions tab (any branch)

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Select Xcode 16
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16"

      - name: Show build environment
        run: |
          xcodebuild -version
          xcodebuild -list -project Siraat.xcodeproj

      - name: Run tests (correctness validation)
        run: |
          set -o pipefail
          xcodebuild \
            -project Siraat.xcodeproj \
            -scheme Siraat \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            test

      - name: Build (Release, no code signing)
        run: |
          set -o pipefail
          xcodebuild \
            -project Siraat.xcodeproj \
            -scheme Siraat \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            clean build

      - name: Package unsigned .ipa
        run: |
          APP_PATH="build/Build/Products/Release-iphoneos/Siraat.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "::error::Build product not found at $APP_PATH"
            ls -R build/Build/Products || true
            exit 1
          fi
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -r -y Siraat-unsigned.ipa Payload >/dev/null
          echo "Created Siraat-unsigned.ipa:"
          ls -lh Siraat-unsigned.ipa

      - name: Upload .ipa artifact
        uses: actions/upload-artifact@v5
        with:
          name: Siraat-unsigned-ipa
          path: Siraat-unsigned.ipa
          if-no-files-found: error
          retention-days: 14
