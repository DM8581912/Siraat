name: Prepare adhan sound

# One-off: converts a CC BY-SA 4.0 adhan recording (Wikimedia Commons, author Atcovi)
# into an iOS-compatible notification sound (Adhan.caf, <30s) on the macOS runner, which
# has ffmpeg + afconvert. Download the artifact, commit it to Siraat/Resources/, done.
on:
  push:
    branches: [feat/adhan-audio]
  workflow_dispatch: {}

jobs:
  convert:
    runs-on: macos-15
    timeout-minutes: 10
    steps:
      - name: Download and convert adhan to .caf
        run: |
          set -euo pipefail
          curl -sL "https://upload.wikimedia.org/wikipedia/commons/7/7d/The_Adhan_-_Muslim_Call_to_Prayer_-_Aaqib_Azeez.mp3" -o adhan.mp3
          echo "Downloaded:"; ls -lh adhan.mp3
          # Decode mp3 -> wav with afconvert (Apple tool, always present; no ffmpeg needed).
          afconvert adhan.mp3 adhan_full.wav -d LEI16 -f WAVE
          # Trim to 28s with Python stdlib (iOS notification sounds must be < 30s).
          python3 - <<'PY'
          import wave
          src = wave.open('adhan_full.wav', 'rb')
          rate = src.getframerate()
          frames = src.readframes(int(rate * 28))
          out = wave.open('adhan_trim.wav', 'wb')
          out.setnchannels(src.getnchannels())
          out.setsampwidth(src.getsampwidth())
          out.setframerate(rate)
          out.writeframes(frames)
          out.close()
          print('trimmed: rate', rate, 'channels', src.getnchannels())
          PY
          # IMA4 CAF is the iOS-friendly notification-sound format.
          afconvert adhan_trim.wav Adhan.caf -d ima4 -f caff -v
          echo "Converted:"; ls -lh Adhan.caf
          afinfo Adhan.caf || true

      - name: Upload Adhan.caf
        uses: actions/upload-artifact@v5
        with:
          name: adhan-caf
          path: Adhan.caf
          if-no-files-found: error
          retention-days: 7
